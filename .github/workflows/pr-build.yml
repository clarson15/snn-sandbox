name: PR Build and Test

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - docker-compose.yml
      - ci-docker-compose.yml

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute APP_VERSION (semver)
        id: app_version
        run: |
          short_sha="${GITHUB_SHA::7}"
          pr_number="${{ github.event.pull_request.number }}"
          echo "value=0.0.0-pr.${pr_number}+sha.${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and test frontend/backend in Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ci-test
          push: false
          build-args: |
            APP_VERSION=${{ steps.app_version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
