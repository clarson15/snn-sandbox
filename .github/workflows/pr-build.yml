name: PR Build and Test

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - docker-compose.yml
      - ci-docker-compose.yml

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and test frontend/backend in Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ci-test
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
