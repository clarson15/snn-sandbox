name: PR Build and Test

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - docker-compose.yml
      - ci-docker-compose.yml

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute APP_VERSION (semver)
        id: app_version
        run: |
          short_sha="${GITHUB_SHA::7}"
          pr_number="${{ github.event.pull_request.number }}"
          echo "value=0.0.0-pr.${pr_number}+sha.${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and test frontend/backend in Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ci-test
          push: false
          build-args: |
            APP_VERSION=${{ steps.app_version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Node.js for frontend replay tests
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run deterministic replay parity fixture matrix
        run: |
          cd frontend
          REPLAY_PARITY_FAILURE_SUMMARY_PATH=./test-results/replay-parity-failure-summary.md \
          REPLAY_PARITY_FAILURE_ARTIFACT_PATH=./test-results/replay-parity-failure-artifact.json \
            npm test -- ./src/simulation/replay.test.js -t "validates deterministic replay parity across a curated multi-fixture matrix"

      - name: Upload replay parity failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: replay-parity-failure-artifacts
          path: |
            frontend/test-results/replay-parity-failure-summary.md
            frontend/test-results/replay-parity-failure-artifact.json
          if-no-files-found: warn
