name: PR Build and Test

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - docker-compose.yml
      - ci-docker-compose.yml

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute APP_VERSION (semver)
        id: app_version
        run: |
          short_sha="${GITHUB_SHA::7}"
          pr_number="${{ github.event.pull_request.number }}"
          echo "value=0.0.0-pr.${pr_number}+sha.${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and test frontend/backend in Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ci-test
          push: false
          build-args: |
            APP_VERSION=${{ steps.app_version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Node.js for benchmark reporting
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate deterministic benchmark comparison report (budget-gated)
        run: |
          cd frontend
          npm ci
          npm run benchmark:compare -- \
            --budget-config ./scripts/benchmark-budgets.v1.json \
            --output-json ./benchmark-results/benchmark-comparison.json \
            --output-markdown ./benchmark-results/benchmark-summary.md

      - name: Upload benchmark summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deterministic-benchmark-summary
          path: |
            frontend/benchmark-results/benchmark-comparison.json
            frontend/benchmark-results/benchmark-summary.md
          if-no-files-found: warn
