name: Build Push Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - docker-compose.yml
      - ci-docker-compose.yml

env:
  REGISTRY: registry.charlielarson.dev
  IMAGE_TAG: registry.charlielarson.dev/clarson15/snn-sandbox:latest

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute APP_VERSION (semver)
        id: app_version
        run: |
          short_sha="${GITHUB_SHA::7}"
          tag="$(git tag --points-at HEAD | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$' | head -n1 || true)"

          if [ -n "$tag" ]; then
            echo "Using release tag as APP_VERSION: $tag"
            echo "value=${tag#v}" >> "$GITHUB_OUTPUT"
          else
            echo "No semver tag on HEAD; using commit-derived APP_VERSION"
            echo "value=0.0.0+sha.${short_sha}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to custom registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_TAG }}
          build-args: |
            APP_VERSION=${{ steps.app_version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Call deploy webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            "$DEPLOY_WEBHOOK_URL"
