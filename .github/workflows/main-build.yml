name: Build Push Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - docker-compose.yml
      - ci-docker-compose.yml

env:
  REGISTRY: registry.charlielarson.dev
  IMAGE_NAME: clarson15/snn-sandbox

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute APP_VERSION (semver)
        id: app_version
        run: |
          short_sha="${GITHUB_SHA::7}"
          build_timestamp=$(date -u +"%Y%m%dT%H%M%SZ")
          
          # Find the latest semver tag across all branches
          latest_tag=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 || true)
          
          if [ -n "$latest_tag" ]; then
            # Extract version number and increment patch
            version_num="${latest_tag#v}"
            major=$(echo "$version_num" | cut -d. -f1)
            minor=$(echo "$version_num" | cut -d. -f2)
            patch=$(echo "$version_num" | cut -d. -f3)
            patch=$((patch + 1))
            new_version="${major}.${minor}.${patch}+build.${build_timestamp}"
            echo "Latest tag: $latest_tag, incrementing to: $new_version"
            echo "value=${new_version}" >> "$GITHUB_OUTPUT"
            echo "sha_tag=${new_version%%+build.*}" >> "$GITHUB_OUTPUT"
          else
            # No tags found, start at v0.0.1
            echo "No semver tags found, starting at v0.0.1"
            echo "value=0.0.1+build.${build_timestamp}" >> "$GITHUB_OUTPUT"
            echo "sha_tag=0.0.1" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate APP_VERSION format
        run: |
          echo "Validating APP_VERSION format..."
          scripts/validate-app-version.sh "${{ steps.app_version.outputs.value }}"
          echo "APP_VERSION format validated successfully"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to custom registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.app_version.outputs.sha_tag }}
          build-args: |
            APP_VERSION=${{ steps.app_version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Call deploy webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            "$DEPLOY_WEBHOOK_URL"

      - name: Tag git commit with version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a v${{ steps.app_version.outputs.value }} -m "Release v${{ steps.app_version.outputs.value }}"
          git push origin v${{ steps.app_version.outputs.value }}
