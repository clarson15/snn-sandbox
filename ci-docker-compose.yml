# This docker-compose file defines the runtime configuration for snn-sandbox in the CI environment in Portainer.

services:
  snn-sandbox:
    image: registry.charlielarson.dev/clarson15/snn-sandbox:latest
    container_name: snn-sandbox
    restart: always
    environment:
      VITE_FIREBASE_API_KEY: ${FIREBASE_API_KEY}
      VITE_FIREBASE_AUTH_DOMAIN: ${FIREBASE_AUTH_DOMAIN}
      VITE_FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      VITE_FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${FIREBASE_MESSAGING_SENDER_ID}
      VITE_FIREBASE_APP_ID: ${FIREBASE_APP_ID}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sandbox.rule=Host(`snn-sandbox.charlielarson.dev`)"
      - "traefik.http.routers.sandbox.entrypoints=websecure"
      - "traefik.http.routers.sandbox.tls.certresolver=cloudflare"

networks:
  default:
    name: internal-network
    external: true